name: Build Arch ARM64 Native

on:
  workflow_dispatch:

# Berechtigungen für das Hochladen in die Registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Hier nutzen wir den nativen ARM64 Runner
    runs-on: ubuntu-24.04-arm64
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./build-img
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/build-img:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max